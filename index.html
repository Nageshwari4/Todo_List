<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <link rel="stylesheet" href="./todo.css">

</head>
<body>
    <div class="container">
        <div class="todo_app">
            <div class="header">
                <h3>Todo_List</h3>
                <img src="./todo.jpg" alt="Todo List">
            </div>
            <div class="textbox">  
                <input type="text" id="text_box" placeholder="Enter the todo items">
                <button class="addbtn" id="btnadd" onclick="btnadd()">Add</button>
            </div>
            <div class="list_value">
                <ul id="todolist">
                     
                </ul>
            </div>
        </div>
    </div>
    <script src="./todo.js"></script>
</body>
</html>
